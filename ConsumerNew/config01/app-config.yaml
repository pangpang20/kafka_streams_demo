# 应用级配置文件 - config01 (baseinfo 表，需要质检)

app:
  # 应用名称 (用于 Kafka Streams Application ID)
  name: "baseinfo-consumer-app"

  # 状态存储目录
  state_dir: "/tmp/kafka-streams-baseinfo"

  # 自动 offset 重置策略
  auto_offset_reset: "earliest"

# 日志配置
logging:
  dir: "./logs"
  verbose: true

# 多表配置
tables:
  - table_name: "baseinfo"
    topic: "baseinfo-topic"
    enabled: true
    # 需要质检
    skip_validation: false
    # 自动建表
    auto_create_table: true
    # 写入配置
    write_to_topic: true
    write_to_db: true
    write_to_oceanbase: true
    valid_data_topic: "baseinfo-valid-topic"
    invalid_data_topic: "baseinfo-invalid-topic"
    # 表前缀配置
    invalid_table_prefix: "e_"
