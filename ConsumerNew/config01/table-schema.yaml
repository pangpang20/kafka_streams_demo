# 表结构配置文件 - config01 (baseinfo 人员基本信息表)

tables:
  - name: "baseinfo"
    description: "人员基本信息表"

    # 字段定义
    fields:
      - name: "personid"
        type: "BIGINT"
        description: "人员 ID"
        nullable: true

      - name: "idcard"
        type: "STRING"
        description: "身份证号"
        nullable: false
        is_primary_key: true

      - name: "name"
        type: "STRING"
        description: "姓名"
        nullable: true

      - name: "sex"
        type: "STRING"
        description: "性别"
        nullable: true

      - name: "age"
        type: "INT"
        description: "年龄"
        nullable: true

      - name: "birthdate"
        type: "TIMESTAMP"
        description: "出生日期"
        nullable: true

      - name: "birthplace"
        type: "STRING"
        description: "出生地"
        nullable: true

      - name: "address"
        type: "STRING"
        description: "现住址"
        nullable: true

      - name: "telephone"
        type: "STRING"
        description: "电话号码"
        nullable: true

      - name: "regdatetime"
        type: "TIMESTAMP"
        description: "注册时间"
        nullable: true

      - name: "updatetime"
        type: "TIMESTAMP"
        description: "更新时间"
        nullable: true

      - name: "citizen"
        type: "DECIMAL"
        description: "是否公民"
        nullable: true

      - name: "creditscore"
        type: "DOUBLE"
        description: "信用分"
        nullable: true

      - name: "photo"
        type: "BYTES"
        description: "照片"
        nullable: true

      - name: "bloodtype"
        type: "STRING"
        description: "血型"
        nullable: true

      - name: "housingareas"
        type: "DECIMAL"
        description: "住房面积"
        nullable: true
