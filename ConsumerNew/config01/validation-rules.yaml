# 数据验证规则配置文件
# 使用说明：为每个表的字段定义验证规则
# 支持的规则类型：not_null, range, enum, regex, min_length, max_length

tables:
  # 表 1: baseinfo 人员基本信息表的验证规则
  - name: "baseinfo"
    rules:
      # 性别验证规则
      - field: "sex"
        type: "enum"
        description: "性别只能是'男'或'女'"
        enabled: true
        values: ["男", "女"]

      # 年龄验证规则
      - field: "age"
        type: "range"
        description: "年龄必须在 0-120 之间"
        enabled: true
        min_value: 0
        max_value: 120

      # 电话号码验证规则
      - field: "telephone"
        type: "regex"
        description: "电话号码必须符合中国手机号格式"
        enabled: true
        pattern: "^1[3-9]\\d{9}$"

      # 血型验证规则
      - field: "bloodtype"
        type: "enum"
        description: "血型只能是 A、B、O、AB"
        enabled: true
        values: ["A", "B", "O", "AB"]

      # 信用分验证规则
      - field: "creditscore"
        type: "range"
        description: "信用分必须在 0-1000 之间"
        enabled: true
        min_value: 0.0
        max_value: 1000.0

      # 住房面积验证规则
      - field: "housingareas"
        type: "range"
        description: "住房面积必须非负"
        enabled: true
        min_value: 0.0

      # 姓名验证规则 (示例：长度限制)
      - field: "name"
        type: "length"
        description: "姓名长度必须在 2-20 个字符之间"
        enabled: false
        min_length: 2
        max_length: 20

      # 身份证号验证规则 (示例：格式验证)
      - field: "idcard"
        type: "regex"
        description: "身份证号格式验证"
        enabled: false
        pattern: "^[1-9]\\d{5}(18|19|20)\\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\\d|3[01])\\d{3}[\\dXx]$"

  # 表 2: orderinfo 订单信息表 - 跳过质检直接入库
  - name: "orderinfo"
    # 跳过数据质量验证，直接入库
    skip_validation: true
    rules: []
