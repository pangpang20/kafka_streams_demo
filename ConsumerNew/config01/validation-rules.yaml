# 数据验证规则配置文件 - config01 (baseinfo 人员基本信息表)

tables:
  - name: "baseinfo"
    rules:
      # 性别验证规则
      - field: "sex"
        type: "enum"
        description: "性别只能是'男'或'女'"
        enabled: true
        values: ["男", "女"]

      # 年龄验证规则
      - field: "age"
        type: "range"
        description: "年龄必须在 0-120 之间"
        enabled: true
        min_value: 0
        max_value: 120

      # 电话号码验证规则
      - field: "telephone"
        type: "regex"
        description: "电话号码必须符合中国手机号格式"
        enabled: true
        pattern: "^1[3-9]\\d{9}$"

      # 血型验证规则
      - field: "bloodtype"
        type: "enum"
        description: "血型只能是 A、B、O、AB"
        enabled: true
        values: ["A", "B", "O", "AB"]

      # 信用分验证规则
      - field: "creditscore"
        type: "range"
        description: "信用分必须在 0-1000 之间"
        enabled: true
        min_value: 0.0
        max_value: 1000.0

      # 住房面积验证规则
      - field: "housingareas"
        type: "range"
        description: "住房面积必须非负"
        enabled: true
        min_value: 0.0
