# 应用级配置文件 - config02 (orderinfo 订单表，跳过质检)

app:
  # 应用名称 (用于 Kafka Streams Application ID)
  name: "orderinfo-consumer-app"

  # 状态存储目录
  state_dir: "/tmp/kafka-streams-orderinfo"

  # 自动 offset 重置策略 (earliest/latest)
  auto_offset_reset: "earliest"

# 源表配置
source:
  # 源表名 (对应 CDC 数据中的 tablename)
  table_name: "orderinfo"

  # 源 Topic 名称
  topic: "orderinfo-topic"

  # 是否自动在 OceanBase 中创建目标表
  auto_create_table: true

  # 是否写入 Kafka Topic
  write_to_topic: true

  # 正常数据 Topic (跳过质检时，所有数据都视为正常数据)
  valid_data_topic: "orderinfo-valid"

  # 异议数据 Topic
  invalid_data_topic: "orderinfo-invalid"

  # 是否写入 OceanBase 数据库
  write_to_oceanbase: true

  # 异议数据表名 (自动添加 e_ 前缀)
  invalid_table_prefix: "e_"

# 日志配置
logging:
  # 日志文件目录
  dir: "./logs"

  # 是否打印详细日志
  verbose: true

# 多表配置
tables:
  - table_name: "orderinfo"
    topic: "orderinfo-topic"
    valid_data_topic: "orderinfo-valid"
    invalid_data_topic: "orderinfo-invalid"
    enabled: true
    # 跳过数据质量验证，直接入库
    skip_validation: true
