# 应用级配置文件 - config02 (orderinfo 订单表，跳过质检)

app:
  # 应用名称 (用于 Kafka Streams Application ID)
  name: "orderinfo-consumer-app"

  # 状态存储目录
  state_dir: "/tmp/kafka-streams-orderinfo"

  # 自动 offset 重置策略
  auto_offset_reset: "earliest"

# 日志配置
logging:
  dir: "./logs"
  verbose: true

# 多表配置
tables:
  - table_name: "orderinfo"
    topic: "orderinfo-topic"
    valid_data_topic: "orderinfo-valid"
    invalid_data_topic: "orderinfo-invalid"
    enabled: true
    # 跳过数据质量验证，直接入库
    skip_validation: true
