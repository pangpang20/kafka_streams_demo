# baseinfo 表验证规则
tables:
  - name: "baseinfo"
    rules:
      - field: "sex"
        type: "enum"
        enabled: true
        values: ["男", "女"]
      - field: "age"
        type: "range"
        enabled: true
        min_value: 0
        max_value: 120
      - field: "telephone"
        type: "regex"
        enabled: true
        pattern: "^1[3-9]\\d{9}$"
      - field: "bloodtype"
        type: "enum"
        enabled: true
        values: ["A", "B", "O", "AB"]
      - field: "creditscore"
        type: "range"
        enabled: true
        min_value: 0.0
        max_value: 1000.0
      - field: "housingareas"
        type: "range"
        enabled: true
        min_value: 0.0
