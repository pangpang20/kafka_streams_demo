# baseinfo 表结构配置
tables:
  - name: "baseinfo"
    description: "人员基本信息表"
    fields:
      - name: "personid"
        type: "BIGINT"
        nullable: true
      - name: "idcard"
        type: "STRING"
        nullable: false
        isPrimaryKey: true
      - name: "name"
        type: "STRING"
        nullable: true
      - name: "sex"
        type: "STRING"
        nullable: true
      - name: "age"
        type: "INT"
        nullable: true
      - name: "telephone"
        type: "STRING"
        nullable: true
      - name: "bloodtype"
        type: "STRING"
        nullable: true
      - name: "creditscore"
        type: "DOUBLE"
        nullable: true
      - name: "housingareas"
        type: "DOUBLE"
        nullable: true
