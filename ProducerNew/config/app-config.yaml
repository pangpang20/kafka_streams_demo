# Producer 应用配置文件

app:
  # 应用名称
  name: "configurable-producer-app"

  # 日志目录
  log_dir: "./logs"

# 发送配置
send:
  # 发送间隔（毫秒）
  interval_ms: 1000

  # 运行时长（秒），0 表示无限运行
  duration_seconds: 0

  # 每多少条打印一次统计
  log_interval: 100

# 操作概率配置（总和应为 100）
operation:
  # 插入操作概率（%）
  insert_probability: 50

  # 更新操作概率（%）
  update_probability: 45

  # 删除操作概率（%）
  delete_probability: 5

# 数据质量配置
data_quality:
  # 问题数据概率（%）
  bad_data_probability: 10

# Topic 自动创建配置
topic:
  # 是否自动创建 topic
  auto_create: true
  # 默认分区数
  partitions: 3
  # 默认副本数
  replication_factor: 3

# 多表配置（支持配置多个表，每个表有自己的 topic）
# 如果不配置 tables，则使用 source 配置（单表模式）
tables:
  - table_name: "baseinfo"
    topic: "baseinfo-topic"
    database_name: "test"
    database_type: "mysql"
    enabled: true
    # 指定该表的发送间隔（毫秒）
    interval_ms: 1000
  # 可以添加更多表...
  - table_name: "orderinfo"
    topic: "orderinfo-topic"
    database_name: "test"
    database_type: "mysql"
    enabled: true
    # 指定该表的发送间隔（毫秒）
    interval_ms: 1000

# 单表模式时的源表配置（当 tables 为空时使用）
source:
  # 源表名
  table_name: "baseinfo"

  # 目标 Topic 名称
  topic: "mytopic"

  # 数据库名（CDC 数据中使用）
  database_name: "test"

  # 数据库类型
  database_type: "mysql"
